server:
  port: ${NOTIFICATION_PORT:8085}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${NOTIFY_DB_HOST:localhost}:${NOTIFY_DB_PORT:5434}/${NOTIFY_DB_NAME:eps_db}
    driver-class-name: org.postgresql.Driver
    username: ${NOTIFY_DB_USER:eps_user}
    password: ${NOTIFY_DB_PASSWORD:eps_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: notify_db
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: notify_db
    default-schema: notify_db
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

  # ── Kafka Consumer ──
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-secret-must-be-at-least-32-chars-long}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    issuer: ${JWT_ISSUER:eps-tenant-service}
  internal:
    secret: ${INTERNAL_API_SECRET:internal-collector-secret-change-me}
  mail:
    enabled: ${ALERT_MAIL_ENABLED:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.vdt.soc.notification: DEBUG
