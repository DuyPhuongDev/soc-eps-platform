server:
  port: ${NOTIFICATION_PORT:8085}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:eps_db}?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:eps_user}
    password: ${DB_PASSWORD:eps_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: notify_db
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: notify_db
    default-schema: notify_db
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

  # ── Kafka Consumer ──
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}

      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME:}"
        password="${KAFKA_PASSWORD:}";

      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION:}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD:}

    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-secret-must-be-at-least-32-chars-long}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    issuer: ${JWT_ISSUER:eps-tenant-service}
  internal:
    secret: ${INTERNAL_API_SECRET:internal-collector-secret-change-me}
  mail:
    enabled: ${ALERT_MAIL_ENABLED:true}

notification:
  kafka:
    inbound-topic: ${KAFKA_NOTIFICATION_INBOUND_TOPIC:soc.events.notification}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

