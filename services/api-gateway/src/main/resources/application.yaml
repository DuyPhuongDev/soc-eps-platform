server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - http://localhost:3000
                allowedMethods:
                  - GET
                  - POST
                  - OPTIONS
                  - PUT
                  - DELETE
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # ── Tenant Service ──
            - id: tenant-service
              uri: lb://tenant-service
              predicates:
                - Path=/api/v1/tenants/**,/api/v1/auth/**
            # ── License Service ──
            - id: license-service
              uri: lb://license-service
              predicates:
                - Path=/api/v1/licenses/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-secret-must-be-at-least-32-chars-long}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    issuer: ${JWT_ISSUER:eps-tenant-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
