server:
  port: 8082
spring:
  application:
    name: tenant-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:eps_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:eps_user}
    password: ${DB_PASSWORD:eps_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: tenant_db
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: tenant_db
    default-schema: tenant_db
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-secret-must-be-at-least-32-chars-long}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    issuer: ${JWT_ISSUER:eps-tenant-service}
  internal:
    secret: ${INTERNAL_API_SECRET:internal-collector-secret-change-me}
    header-name: X-Internal-Secret
  api-key:
    prefix: "eps_"
    random-bytes: 32
  etcd:
    endpoints: ${ETCD_ENDPOINTS:http://localhost:2379}
    key-prefix: /apikeys/
    connect-timeout-ms: 5000
    watch-retry-delay-ms: 3000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
