server:
  port: 8083
spring:
  application:
    name: license-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:eps_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:eps_user}
    password: ${DB_PASSWORD:eps_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: license_db
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: license_db
    default-schema: license_db
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history
    out-of-order: false
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}

      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME:}"
        password="${KAFKA_PASSWORD:}";

      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION:}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD:}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-secret-must-be-at-least-32-chars-long}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    issuer: ${JWT_ISSUER:eps-tenant-service}
  etcd:
    endpoints: ${ETCD_ENDPOINTS:http://localhost:2379}
    key-prefix: /policies/
    connect-timeout-ms: 5000
    watch-retry-delay-ms: 3000

license:
  events:
    license-reminder-cron: ${LICENSE_REMINDER_CRON:0 * * * * *}
    license-reminder-days-before: ${LICENSE_REMINDER_DAY_BEFORE:7}
    license-reminder-window-minutes: ${LICENSE_REMINDER_WINDOW_MINUTES:1440}

notification:
  events:
    topic: ${KAFKA_NOTIFICATION_INBOUND_TOPIC:soc.events.notification}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
