server:
  port: ${COLLECTOR_PORT:8081}

spring:
  application:
    name: collector
  main:
    web-application-type: reactive

  # Reactive Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 1000ms
        shutdown-timeout: 100ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME:}"
        password="${KAFKA_PASSWORD:}";
      ssl.truststore.location: ${KAFKA_TRUSTSTORE_LOCATION:}
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      compression-type: lz4
      linger-ms: 5
      batch-size: 16384
      retries: 0
      max-in-flight-requests-per-connection: 5
    admin:
      auto-create: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Collector app properties ──
app:
  # Internal API (license-service and tenant-service)
  internal-api:
    license-service-url: ${LICENSE_SERVICE_URL:http://localhost:8083}
    tenant-service-url: ${TENANT_SERVICE_URL:http://localhost:8082}
    internal-secret: ${INTERNAL_SECRET:internal-collector-secret-change-me}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    apiKeyUri: /api/v1/internal/api-keys
    policyUri: /api/v1/licenses/internal/policies

  # Cache refresh
  cache:
    refresh-interval-seconds: ${CACHE_REFRESH_INTERVAL:30}
  kafka:
    event-topic: ${KAFKA_EVENT_TOPIC:events}

