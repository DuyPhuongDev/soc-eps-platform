# docker-compose.collector-lb.yaml
# Overlay compose file: nginx load balancer + 3 collector instances.
# Use with the base compose that defines infra (redis, kafka, etcd, postgres, timescale):
#
#   docker compose -f docker-compose.yaml -f docker-compose.collector-lb.yaml up -d
#
# Nginx listens on host port 8088 and load-balances across collector-1/2/3
# on the shared `eps-network` bridge. All collector instances share the
# same external state (Redis, etcd, Kafka) so horizontal scaling is safe.

services:
  # ── Collector instances (3 replicas) ────────────────────────────────
  collector-1:
    build:
      context: .
      dockerfile: ingestion/collector/Dockerfile
    container_name: eps-collector-1
    environment: &collector-env
      COLLECTOR_PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ETCD_ENDPOINTS: http://etcd:2379
      LICENSE_SERVICE_URL: http://license-service:8083
      TENANT_SERVICE_URL: http://tenant-service:8082
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-internal-collector-secret-change-me}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,prometheus,metrics,info
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKA_TRUSTSTORE_LOCATION: file:/certs/kafka.truststore.jks
      KAFKA_TRUSTSTORE_PASSWORD: ${KAFKA_TRUSTSTORE_PASSWORD}
      KAFKA_EVENT_TOPIC: events
    networks:
      - eps-network
    depends_on:
      redis:
        condition: service_started
      etcd:
        condition: service_started
    restart: unless-stopped

