# nginx load balancer for multi-instance collector service.
# Listens on 8088 (host) and round-robins across collector-1/2/3:8081
# on the `eps-network` bridge network.

upstream collector_backend {
    # least_conn balances by active connections; default round-robin also works.
    least_conn;

    # Passive health check: after 3 failed connections within fail_timeout
    # (10s), nginx marks the peer down for fail_timeout and skips it.
    server collector-1:8081 max_fails=3 fail_timeout=10s;
    server collector-2:8081 max_fails=3 fail_timeout=10s;
    server collector-3:8081 max_fails=3 fail_timeout=10s;

    # Reuse upstream connections (collector is WebFlux/Netty — keepalive friendly).
    keepalive 32;
}

server {
    listen 8088;
    server_name _;

    # Access log per-instance visibility (helps prove round-robin during benchmarks).
    access_log /var/log/nginx/access.log combined;

    # Passthrough proxy — collector serves /v1/events, /v1/events/batch,
    # /actuator/health, /swagger-ui.html, /v3/api-docs. No path rewrite.
    location / {
        proxy_pass http://collector_backend;
        proxy_http_version 1.1;

        # Preserve request context.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Passthrough auth header used by the collector (X-API-Key).
        proxy_set_header X-API-Key         $http_x_api_key;

        # Enable keepalive to upstream.
        proxy_set_header Connection        "";

        # WebFlux reactive — short connect timeout, generous read/send.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
