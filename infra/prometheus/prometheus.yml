global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "eureka-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server:8761"]

  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "tenant-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["tenant-service:8082"]

  - job_name: "license-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["license-service:8083"]

  - job_name: "aggregate-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["aggregate-service:8084"]

  - job_name: "notification-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8085"]

  - job_name: "collector"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "collector-1:8081"
          - "collector-2:8081"
          - "collector-3:8081"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
