services:
  postgres:
    image: postgres:17
    container_name: eps-postgres
    environment:
      POSTGRES_DB: eps_db
      POSTGRES_USER: eps_user
      POSTGRES_PASSWORD: eps_password
    ports:
      - "5434:5432"
    volumes:
      - eps-postgres-data:/var/lib/postgresql/data
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U eps_user -d eps_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eps-redis
    ports:
      - "6379:6379"
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - eps-redis-data:/data

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: eps-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5

  eureka-server:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.eureka-server
    container_name: eps-eureka
    ports:
      - "8086:8086"
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8086/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api-gateway
    container_name: eps-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  eps-network:
    driver: bridge

volumes:
  eps-postgres-data:
  eps-redis-data:
