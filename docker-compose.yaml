services:
  postgres:
    image: postgres:17
    container_name: eps-postgres
    environment:
      POSTGRES_DB: eps_db
      POSTGRES_USER: eps_user
      POSTGRES_PASSWORD: eps_password
    ports:
      - "5434:5432"
    volumes:
      - eps-postgres-data:/var/lib/postgresql/data
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U eps_user -d eps_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: eps-redis
    ports:
      - "6379:6379"
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - eps-redis-data:/data

  kafka-1:
    image: apache/kafka
    hostname: kafka-1
    container_name: kafka-kraft-1
    ports:
      - "29092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka-1:9093,INTERNAL://kafka-1:9094
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:29092,INTERNAL://kafka-1:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_RETENTION_HOURS: 24
    networks:
      - eps-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "./opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - kafka-data-1:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "9999:8080"
    restart: always
    environment:
      KAFKA_CLUSTERS_0_NAME: "kraft-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9094
    depends_on:
      - kafka-1
    networks:
      - eps-network

  # ── TimescaleDB for aggregate-service ──
  timescaledb_aggregate:
    image: timescale/timescaledb:latest-pg17
    container_name: eps-timescaledb-aggregate
    environment:
      POSTGRES_DB: eps_aggregate_db
      POSTGRES_USER: eps_user
      POSTGRES_PASSWORD: eps_password
    ports:
      - "5435:5432"
    volumes:
      - eps-timescaledb-aggregate-data:/var/lib/postgresql/data
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U eps_user -d eps_aggregate_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.6.0
    container_name: etcd
    hostname: etcd-1
    ports:
      - "2379:2379"
      - "2380:2380"
    command:
      - /usr/local/bin/etcd
      - --name=etcd-1
      - --data-dir=/etcd-data

      # client
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://localhost:2379

      # peer
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd-1:2380
      - --initial-cluster=etcd-1=http://etcd-1:2380
      - --initial-cluster-state=new
    networks:
      - eps-network
    volumes:
      - ./data/etcd-data:/etcd-data

networks:
  eps-network:
    driver: bridge

volumes:
  eps-postgres-data:
  eps-redis-data:
  kafka-data-1:
  eps-timescaledb-aggregate-data:
