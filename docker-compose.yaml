services:

  redis:
    image: redis:latest
    container_name: eps-redis
    ports:
      - "6379:6379"
    networks:
      - eps-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - eps-redis-data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.6.0
    container_name: etcd
    hostname: etcd-1
    ports:
      - "2379:2379"
      - "2380:2380"
    command:
      - /usr/local/bin/etcd
      - --name=etcd-1
      - --data-dir=/etcd-data

      # client
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://localhost:2379

      # peer
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd-1:2380
      - --initial-cluster=etcd-1=http://etcd-1:2380
      - --initial-cluster-state=new
    networks:
      - eps-network
    volumes:
      - ./data/etcd-data:/etcd-data

  cloud-flared-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloud-flared-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - eps-network

networks:
  eps-network:
    driver: bridge

volumes:
  eps-redis-data:
